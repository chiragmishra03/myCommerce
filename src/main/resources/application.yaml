server:
  port: ${SPRING_SERVER_PORT}

spring:
  application:
    name: myCommerce


  datasource:
    url: jdbc:mysql://localhost:3306/mycommerce
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
