server:
  port: ${SPRING_SERVER_PORT:8080}

spring:
  application:
    name: myCommerce

  datasource:
    url: jdbc:mysql://localhost:3306/mycommerce
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# Move logging to the root of the file
logging:
  level:
    org.flywaydb: DEBUG